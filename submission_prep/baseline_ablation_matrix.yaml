status_date: "2026-05-11"
paper_id: "TII_operator_attention"
scope: "Command-bound baseline and ablation matrix for Paper 07."
evidence_level: "config-target validated only"
submission_ready: false
base_config: "paper/UXFD_paper/TII_operator_attention/configs/vibench/min.yaml"
validation_note: >
  The commands below bind the required baseline and ablation surface to concrete
  PHM-Vibench entrypoints. They do not yet satisfy the strict IEEE gate because
  they have not been run on accepted industrial datasets with multi-seed GPU
  metadata, confidence intervals, TOP representative artifacts, or SOTA evidence.

common_policy:
  devices: "local RTX 4090 GPUs 0,1 only"
  default_binding: "CUDA_VISIBLE_DEVICES=0"
  scheduler: "one GPU per run; at most two concurrent single-GPU jobs"
  required_metadata:
    - "CUDA_VISIBLE_DEVICES"
    - "GPU model"
    - "seed"
    - "batch size"
    - "precision"
    - "runtime"
    - "dataset split"
    - "OOM or failure reason"

proposed:
  id: "P00"
  label: "XOAN/DSOA operator attention"
  command: "CUDA_VISIBLE_DEVICES=0 python main.py --config paper/UXFD_paper/TII_operator_attention/configs/vibench/min.yaml --override trainer.num_epochs=1 --override data.num_workers=0"
  config_target_validated: true
  accepted_evidence_status: "dummy smoke only; industrial GPU evidence pending"

